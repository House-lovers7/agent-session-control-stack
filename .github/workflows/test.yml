name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit, doctor-security, and evidence-boundary tests
        run: python3 -m unittest discover tests -v
      - name: Validate JSON, manifests, internal links, and lock consistency
        if: matrix.python-version == '3.14'
        run: python3 scripts/validate_repo.py --require-upstream-lock
      - name: Validate shell scripts
        if: matrix.python-version == '3.14'
        run: |
          bash -n plugins/ascs/scripts/ascs_doctor.sh
          shellcheck plugins/ascs/scripts/ascs_doctor.sh
          python3 -m py_compile plugins/ascs/scripts/ascs_doctor.py scripts/validate_repo.py scripts/check_state.py
